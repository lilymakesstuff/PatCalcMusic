<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lilys music stuff for patrick using calculus</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.9.77/Tone.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 10px; }
    input, select { margin: 5px; }
    canvas { display: block; margin-top: 10px; border: 1px solid #444; }
  </style>
</head>
<body>

<h2>Lilys music stuff for patrick using calculus!!!</h2>
<p>Enter up to 3 functions of t (e.g., sin(t), 0.5*t, t^2). Each wave can be Original / Derivative / Integral.</p>

<div id="waveControls"></div>
<button onclick="playAll()">Play + Visualize</button>

<canvas id="plotCanvas" width="800" height="300"></canvas>

<script>
const waveCount = 3;
const waves = [];
const canvas = document.getElementById('plotCanvas');
const ctx = canvas.getContext('2d');
let audioEnabled = false;

window.addEventListener('load', () => {
  buildControls();
  drawMessage('Enter functions and click Play + Visualize');
});

function buildControls() {
  const container = document.getElementById('waveControls');
  container.innerHTML = '';
  for (let i = 0; i < waveCount; i++) {
    const div = document.createElement('div');
    div.innerHTML = `
      Wave ${i + 1}:
      <input type="text" id="func${i}" value="sin(${i + 1}*t)" size="15">
      <select id="mode${i}">
        <option value="original">Original</option>
        <option value="derivative">Derivative</option>
        <option value="integral">Integral</option>
      </select>
    `;
    container.appendChild(div);
    waves[i] = { func: `sin(${i + 1}*t)`, mode: 'original' };
  }
}

function drawMessage(text) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#eee';
  ctx.font = '16px sans-serif';
  ctx.fillText(text, 10, 30);
}

async function playAll() {
  audioEnabled = false;

  if (window.Tone && Tone.start) {
    try {
      await Tone.start();
      await Tone.context.resume();
      console.log('Tone started:', Tone.context.state);
      audioEnabled = true;
    } catch (err) {
      console.error('Tone.start failed', err);
      drawMessage('Audio start failed');
    }
  }

  for (let i = 0; i < waveCount; i++) {
    waves[i].func = document.getElementById(`func${i}`).value;
    waves[i].mode = document.getElementById(`mode${i}`).value;
  }

  const dt = 0.02;
  const data = [];
  const prevRaw = Array(waveCount).fill(0);
  const integrals = Array(waveCount).fill(0);
  let t = 0;

  for (let i = 0; i < 400; i++) {
    let sum = 0;
    for (let w = 0; w < waveCount; w++) {
      const raw = evaluateFunction(waves[w].func, t);
      let val = raw;
      if (waves[w].mode === 'derivative') {
        val = (raw - prevRaw[w]) / dt;
      } else if (waves[w].mode === 'integral') {
        integrals[w] += raw * dt;
        val = integrals[w];
      }
      prevRaw[w] = raw;
      sum += val;
    }
    data.push(sum);
    t += dt;
  }

  const maxVal = Math.max(...data.map(Math.abs), 1);
  const normalized = data.map(v => v / maxVal);

  drawGraph(normalized);

  if (audioEnabled) {
    playTone(normalized);
  }
}

function drawGraph(normalized) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  normalized.forEach((value, i) => {
    const x = (i / (normalized.length - 1)) * canvas.width;
    const y = ((1 - value) / 2) * (canvas.height - 40) + 20;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

async function playTone(normalized) {
  await Tone.start();
  if (Tone.context.state !== 'running') {
    await Tone.context.resume();
  }

  Tone.Destination.volume.value = -6;

  const now = Tone.now();
  const duration = 2;
  const osc = new Tone.Oscillator(440, 'sine').connect(Tone.Destination);
  osc.volume.value = 0;
  osc.start(now);

  normalized.forEach((v, i) => {
    const freq = 220 + (v + 1) * 330;
    osc.frequency.setValueAtTime(freq, now + (i / normalized.length) * duration);
  });

  osc.stop(now + duration);
  setTimeout(() => osc.dispose(), (duration + 0.1) * 1000);
}

function evaluateFunction(funcText, t) {
  try {
    const expr = funcText
      .replace(/\^/g, '**')
      .replace(/\bpi\b/gi, 'Math.PI')
      .replace(/\be\b/gi, 'Math.E');

    return Function(
      't,sin,cos,tan,asin,acos,atan,sqrt,abs,log,exp,pow',
      'return ' + expr + ';'
    )(
      t,
      Math.sin,
      Math.cos,
      Math.tan,
      Math.asin,
      Math.acos,
      Math.atan,
      Math.sqrt,
      Math.abs,
      Math.log,
      Math.exp,
      Math.pow
    );
  } catch (error) {
    console.error('parse error', error, funcText);
    return 0;
  }
}
</script>

</body>
</html>
