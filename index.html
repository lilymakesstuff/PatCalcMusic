<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lilys music stuff for patrick using calculus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.9.77/Tone.min.js"></script>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 10px; }
  input, select { margin: 5px; }
</style>
</head>
<body>

<h2>Lilys music stuff for patrick using calculus!!!</h2>
<p>Enter up to 3 functions of t (e.g., sin(t), 0.5*t, t^2). Each wave can be Original / Derivative / Integral.</p>

<div id="waveControls"></div>
<button onclick="playAll()">Play + Visualize</button>

<div id="canvasContainer"></div>

<script>
let osc = [];
const waveCount = 3;
const waves = [];

window.setup = function() {
  const canvas = createCanvas(800, 300);
  canvas.parent('canvasContainer');
  canvas.style('border', '1px solid #444');
  background(0);
  textSize(16);
  fill(255);
  noLoop();
  buildControls();
};

function buildControls() {
  const container = document.getElementById('waveControls');
  container.innerHTML = '';
  for (let i = 0; i < waveCount; i++) {
    const div = document.createElement('div');
    div.innerHTML = `
      Wave ${i + 1}:
      <input type="text" id="func${i}" value="sin(${i + 1}*t)" size="15">
      <select id="mode${i}">
        <option value="original">Original</option>
        <option value="derivative">Derivative</option>
        <option value="integral">Integral</option>
      </select>
    `;
    container.appendChild(div);
    waves[i] = { func: `sin(${i + 1}*t)`, mode: 'original' };
  }
}

async function playAll() {
  await Tone.start();

  for (let i = 0; i < waveCount; i++) {
    waves[i].func = document.getElementById(`func${i}`).value;
    waves[i].mode = document.getElementById(`mode${i}`).value;
  }

  const dt = 0.02;
  const data = [];
  const prevRaw = Array(waveCount).fill(0);
  const integrals = Array(waveCount).fill(0);
  let t = 0;

  for (let i = 0; i < 400; i++) {
    let sum = 0;
    for (let w = 0; w < waveCount; w++) {
      const raw = evaluateFunction(waves[w].func, t);
      let val = raw;
      if (waves[w].mode === 'derivative') {
        val = (raw - prevRaw[w]) / dt;
      } else if (waves[w].mode === 'integral') {
        integrals[w] += raw * dt;
        val = integrals[w];
      }
      prevRaw[w] = raw;
      sum += val;
    }
    data.push(sum);
    t += dt;
  }

  const maxVal = Math.max(...data.map(Math.abs), 1);
  const normalized = data.map(v => v / maxVal);

  background(0);
  stroke(0, 255, 0);
  strokeWeight(2);
  noFill();
  beginShape();
  for (let i = 0; i < normalized.length; i++) {
    const y = map(normalized[i], -1, 1, height - 20, 20);
    vertex(map(i, 0, normalized.length, 0, width), y);
  }
  endShape();

  osc.forEach(o => o.dispose());
  osc = [];

  const now = Tone.now();
  const duration = 2;

  for (let w = 0; w < waveCount; w++) {
    const o = new Tone.Oscillator({ frequency: 440, type: 'sine' }).toDestination();
    o.volume.value = -12;
    o.start(now);
    o.stop(now + duration);
    osc.push(o);
  }

  normalized.forEach((v, i) => {
    const freq = map(v, -1, 1, 220, 880);
    osc.forEach(o => o.frequency.setValueAtTime(freq, now + (i / normalized.length) * duration));
  });
}

function evaluateFunction(funcText, t) {
  try {
    const expr = funcText
      .replace(/\^/g, '**')
      .replace(/\bpi\b/gi, 'Math.PI')
      .replace(/\be\b/gi, 'Math.E');

    return Function('t', 'with(Math){ return ' + expr + '; }')(t);
  } catch (error) {
    console.error('Function parse error:', error, funcText);
    return 0;
  }
}
</script>

</body>
</html>
